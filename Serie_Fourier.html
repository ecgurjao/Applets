<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Série de Fourier Interativa</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
    }

    .coef {
        display: grid;
        grid-template-columns: 80px 120px 120px;
        gap: 8px;
        margin-bottom: 6px;
        align-items: center;
    }

    input {
        width: 90px;
    }

    #controles {
        max-height: 350px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<h2>Série de Fourier</h2>

<p>
\[
x_p(t)=\sum_{k=-9}^{9} a_k e^{-jk\omega t}
\]
</p>

<label>
    Frequência angular \(\omega\):
    <input type="number" id="omega" value="1" step="0.1" onchange="plotar()">
</label>

<h3>Coeficientes complexos \(a_k = \text{Re}(a_k) + j\text{Im}(a_k)\)</h3>

<div id="controles"></div>

<div id="grafico" style="width:100%;height:500px;"></div>

<script>
const kMin = -9;
const kMax = 9;

function criarControles() {
    const div = document.getElementById("controles");

    for (let k = kMin; k <= kMax; k++) {
        const linha = document.createElement("div");
        linha.className = "coef";

        linha.innerHTML = `
            <label>a<sub>${k}</sub></label>
            <input type="number" id="re_${k}" value="${k === 1 || k === -1 ? 0.5 : 0}" step="0.1" onchange="plotar()">
            <input type="number" id="im_${k}" value="0" step="0.1" onchange="plotar()">
        `;

        div.appendChild(linha);
    }
}

function calcularXp(t) {
    const omega = parseFloat(document.getElementById("omega").value);

    let real = 0;
    let imag = 0;

    for (let k = kMin; k <= kMax; k++) {
        const akRe = parseFloat(document.getElementById(`re_${k}`).value);
        const akIm = parseFloat(document.getElementById(`im_${k}`).value);

        const theta = -k * omega * t;

        const cos = Math.cos(theta);
        const sin = Math.sin(theta);

        real += akRe * cos - akIm * sin;
        imag += akRe * sin + akIm * cos;
    }

    return { real, imag };
}

function plotar() {
    const t = [];
    const xReal = [];
    const xImag = [];

    const N = 1000;
    const tMin = -2 * Math.PI;
    const tMax =  2 * Math.PI;

    for (let i = 0; i <= N; i++) {
        const ti = tMin + i * (tMax - tMin) / N;
        const xp = calcularXp(ti);

        t.push(ti);
        xReal.push(xp.real);
        xImag.push(xp.imag);
    }

    const dados = [
        {
            x: t,
            y: xReal,
            mode: "lines",
            name: "Re{xₚ(t)}"
        },
        {
            x: t,
            y: xImag,
            mode: "lines",
            name: "Im{xₚ(t)}",
            line: { dash: "dot" }
        }
    ];

    const layout = {
        title: "Sinal periódico reconstruído pela Série de Fourier",
        xaxis: {
            title: "t",
            range: [-2 * Math.PI, 2 * Math.PI]
        },
        yaxis: {
            title: "xₚ(t)"
        }
    };

    Plotly.newPlot("grafico", dados, layout);
}

criarControles();
plotar();
</script>

</body>
</html>
